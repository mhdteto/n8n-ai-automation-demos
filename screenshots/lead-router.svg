<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">Inbound Lead Router Workflow</title>
  <desc id="desc">A simple workflow diagram showing a webhook, lead classification and routing decision.</desc>
  <rect width="1000" height="560" fill="#f8fafc"/>
  <rect width="1000" height="74" fill="#18202c"/>
  <text x="32" y="48" font-family="Arial, sans-serif" font-size="30" fill="#ffffff" font-weight="700">Inbound Lead Router</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2c78be"/>
    </marker>
  </defs>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="70" y="210" width="220" height="120" rx="10" fill="#ffffff" stroke="#cad5e1" stroke-width="3"/>
    <text x="180" y="278" font-size="28" fill="#172332" font-weight="700">Webhook</text>
    <rect x="390" y="210" width="220" height="120" rx="10" fill="#ffffff" stroke="#cad5e1" stroke-width="3"/>
    <text x="500" y="278" font-size="28" fill="#172332" font-weight="700">Classify</text>
    <rect x="710" y="210" width="220" height="120" rx="10" fill="#ffffff" stroke="#cad5e1" stroke-width="3"/>
    <text x="820" y="278" font-size="28" fill="#172332" font-weight="700">Route</text>
    <line x1="290" y1="270" x2="385" y2="270" stroke="#2c78be" stroke-width="5" marker-end="url(#arrow)"/>
    <line x1="610" y1="270" x2="705" y2="270" stroke="#2c78be" stroke-width="5" marker-end="url(#arrow)"/>
    <text x="180" y="398" font-size="18" fill="#445060">Form data</text>
    <text x="500" y="398" font-size="18" fill="#445060">Priority</text>
    <text x="820" y="398" font-size="18" fill="#445060">Owner</text>
  </g>
</svg>
